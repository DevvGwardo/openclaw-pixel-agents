# CI workflow for openclaw-pixel-agents

name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/FUNDING.yml'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/FUNDING.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node
        id: setup_node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      # --- Quality Checks (blocking) ---

      - name: Type Check
        id: type_check
        if: always() && steps.install.outcome == 'success'
        run: npx tsc -b
        continue-on-error: true

      - name: Lint
        id: lint
        if: always() && steps.install.outcome == 'success'
        run: npm run lint
        continue-on-error: true

      # --- Build (blocking) ---

      - name: Build
        id: build
        if: always() && steps.install.outcome == 'success'
        run: npx vite build
        continue-on-error: true

      # --- Advisory Checks (non-blocking) ---

      - name: Audit Dependencies
        id: audit
        if: always() && steps.install.outcome == 'success'
        run: npm audit --audit-level=high
        continue-on-error: true

      # --- Summary ---

      - name: Write Step Summary
        if: always()
        env:
          CHECKOUT: ${{ steps.checkout.outcome }}
          SETUP_NODE: ${{ steps.setup_node.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          TYPE_CHECK: ${{ steps.type_check.outcome }}
          LINT: ${{ steps.lint.outcome }}
          BUILD: ${{ steps.build.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
        run: |
          status() {
            if [ "$1" = "success" ]; then echo "✅ PASS"; else echo "❌ FAIL"; fi
          }
          {
            echo "## CI Results"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Checkout | $(status "$CHECKOUT") |"
            echo "| Setup Node | $(status "$SETUP_NODE") |"
            echo "| Install deps | $(status "$INSTALL") |"
            echo "| **Type check** | $(status "$TYPE_CHECK") |"
            echo "| **Lint** | $(status "$LINT") |"
            echo "| **Build** | $(status "$BUILD") |"
            echo "| Audit _(advisory)_ | $(status "$AUDIT") |"
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Final Gate ---

      - name: Fail If Any Blocking Check Failed
        if: always()
        env:
          CHECKOUT: ${{ steps.checkout.outcome }}
          SETUP_NODE: ${{ steps.setup_node.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          TYPE_CHECK: ${{ steps.type_check.outcome }}
          LINT: ${{ steps.lint.outcome }}
          BUILD: ${{ steps.build.outcome }}
        run: |
          failed=0
          for step in CHECKOUT SETUP_NODE INSTALL TYPE_CHECK LINT BUILD; do
            eval "val=\$$step"
            if [ "$val" != "success" ]; then
              echo "::error::$step failed"
              failed=1
            fi
          done
          exit "$failed"
